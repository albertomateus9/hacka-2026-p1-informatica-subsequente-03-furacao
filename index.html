<!doctype html>

  <head>

    <title>Furacao | Hacka P1 Informatica Subsequente</title>
    <meta name="description" content="Projeto Furacao da Hacka P1 Informatica Subsequente em preparacao." />

    <style>
      :root { color-scheme: light; font-family: "Segoe UI", Arial, sans-serif; color: #291319; background: #fff4f3; }
      * { box-sizing: border-box; }
      body { margin: 0; background: linear-gradient(135deg, #fee2e2, #fff 45%, #fde68a); }
      main { display: grid; width: min(920px, calc(100% - 2rem)); min-height: 100vh; margin: 0 auto; align-content: center; padding: 2rem 0; }
      section { border: 1px solid #fecaca; border-radius: 8px; padding: clamp(1rem, 4vw, 2.5rem); background: rgba(255,255,255,.94); box-shadow: 0 20px 60px rgba(69,10,10,.12); }
      p { color: #7c4b50; line-height: 1.6; }
      .eyebrow { margin: 0; color: #b91c1c; font-size: .9rem; font-weight: 900; text-transform: uppercase; }
      h1 { margin: .65rem 0 1rem; color: #7f1d1d; font-size: clamp(2.4rem, 7vw, 5rem); line-height: 1; letter-spacing: 0; }
      ul { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: .75rem; margin: 1.5rem 0 0; padding: 0; list-style: none; }
      li { border-left: 4px solid #f97316; border-radius: 8px; padding: .8rem; background: #fff8f5; color: #291319; font-weight: 800; }
      li span { display: block; color: #b91c1c; font-size: .85rem; font-weight: 900; }
      @media (max-width: 620px) { ul { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">Hacka 2026 - P1 Informatica Subsequente</p>
        <h1>Furacao</h1>

        <ul>
          <li><span>Gerente de Ideias</span>Nadir</li>
          <li><span>HTML</span>Adriana</li>
          <li><span>CSS</span>Rafael</li>
          <li><span>JavaScript</span>Marinalda</li>
          <li><span>Funcao pendente</span>Darlene</li>
        </ul>
      </section>
    </main>
  </body>
</html>
